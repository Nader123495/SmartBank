# Upstream statique : avec « set $var » + proxy_pass, la réécriture /api/… peut être incorrecte → 404 sur /api/auth/google.
upstream smartbank_api {
    server api:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Même origine : le front appelle /api (voir environment.prod.ts)
    location /api/ {
        proxy_pass http://smartbank_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 75s;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Swagger UI
    location /swagger {
        proxy_pass http://smartbank_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
